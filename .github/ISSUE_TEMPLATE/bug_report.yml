name: Bug Report
description: Report a bug or unexpected behavior in safrochaind
labels: ["type:bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! Please fill in as much detail as possible to help us reproduce and fix it quickly.
        **Do not report security vulnerabilities here** — see [SECURITY.md](https://github.com/Safrochain-Org/safrochain-node/blob/main/SECURITY.md) instead.

  - type: input
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the bug.
      placeholder: "e.g. safrochaind panics on startup when feepay is enabled with an empty whitelist"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: safrochaind version
      description: Run `safrochaind version` and paste the output.
      placeholder: "e.g. v19.0.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      description: OS and version where the issue was observed.
      placeholder: "e.g. Ubuntu 22.04 / macOS 14.4 / Windows 11"
    validations:
      required: true

  - type: input
    id: chain_id
    attributes:
      label: Chain ID
      description: The chain ID of the network where the issue occurred.
      placeholder: "e.g. safro-1 / local-testnet-1"
    validations:
      required: false

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Step-by-step instructions to reproduce the behavior.
      placeholder: |
        1. Start safrochaind with config ...
        2. Submit transaction ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output. Please use text, not screenshots.
      render: shell
    validations:
      required: false
