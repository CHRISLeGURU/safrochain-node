name: Feature Request
description: Propose a new feature or enhancement for safrochaind
labels: ["type:feature"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement! For early community feedback, consider sharing your idea on [Discord](https://discord.gg/7ftShzFV) before filing a formal request.

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why is this feature needed? What problem does it solve or what value does it add?
      placeholder: "As a validator / developer / user I need ... because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe your proposed solution in as much detail as possible.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider, and why did you rule them out?
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, prior art, references, or screenshots that support this request.
    validations:
      required: false
